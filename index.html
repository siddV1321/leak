<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaniLink | Bhashini AI Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-8">
        <h1 class="text-3xl font-bold text-blue-700">VaniLink</h1>
        <p class="text-gray-600 text-sm">Zero-Capital Multilingual Translator</p>
    </header>

    <main class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">From</label>
                <select id="sourceLang" class="w-full mt-1 p-2 bg-gray-100 rounded-lg border-none focus:ring-2 focus:ring-blue-500">
                    <option value="en">English</option>
                    <option value="hi">Hindi</option>
                    <option value="ta">Tamil</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase">To</label>
                <select id="targetLang" class="w-full mt-1 p-2 bg-gray-100 rounded-lg border-none focus:ring-2 focus:ring-blue-500">
                    <option value="hi">Hindi</option>
                    <option value="en">English</option>
                    <option value="bn">Bengali</option>
                </select>
            </div>
        </div>

        <div id="statusBox" class="h-32 bg-blue-50 rounded-xl flex flex-col items-center justify-center border-2 border-dashed border-blue-200">
            <div id="visualizer" class="flex items-end space-x-1 h-8 mb-2 hidden">
                <div class="w-1 bg-blue-400 animate-bounce h-4"></div>
                <div class="w-1 bg-blue-600 animate-bounce h-8"></div>
                <div class="w-1 bg-blue-400 animate-bounce h-6"></div>
            </div>
            <p id="statusText" class="text-blue-600 font-medium text-sm">Ready to listen</p>
        </div>

        <button id="recordBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition-all transform active:scale-95 shadow-lg flex items-center justify-center gap-2">
            <svg id="micIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m8 0h-4m4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
            </svg>
            <span id="btnText">Push to Speak</span>
        </button>

        <div class="space-y-4 pt-4 border-t border-gray-100">
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Recognized Text</p>
                <p id="recognizedText" class="text-gray-800 italic mt-1">...</p>
            </div>
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase">Translated Text</p>
                <p id="translatedText" class="text-blue-800 font-semibold mt-1">...</p>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-6 text-gray-400 text-xs text-center">
        Powered by Bhashini AI • Innovation Challenge 2024
    </footer>

    <script>
        // --- BHASHINI API CONFIGURATION ---
        // Note: You must get these credentials from the Bhashini Portal
        const API_KEY = "YOUR_BHASHINI_API_KEY"; 
        const USER_ID = "YOUR_USER_ID";
        
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        const visualizer = document.getElementById('visualizer');
        
        let isRecording = false;

        recordBtn.onclick = () => {
            if (!isRecording) {
                startRecording();
            } else {
                stopRecording();
            }
        };

        function startRecording() {
            isRecording = true;
            statusText.innerText = "Listening...";
            statusText.classList.add('text-red-600');
            visualizer.classList.remove('hidden');
            recordBtn.classList.replace('bg-blue-600', 'bg-red-600');
            document.getElementById('btnText').innerText = "Stop & Translate";
            
            // Logic for Web Audio API Speech Recognition goes here
            // Because this is a low-end laptop solution, we use the Browser's 
            // Web Speech API to handle the local mic processing.
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = document.getElementById('sourceLang').value;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('recognizedText').innerText = transcript;
                callBhashiniTranslate(transcript);
            };

            recognition.start();
        }

        async function callBhashiniTranslate(text) {
            statusText.innerText = "Translating via Bhashini Cloud...";
            
            const targetLang = document.getElementById('targetLang').value;

            // Step 1: Call Bhashini NMT (Translation)
            // Replace with actual Bhashini API Fetch call
            try {
                // MOCK RESPONSE for demonstration
                // In production, you'd use fetch("https://dhruva.bhashini.gov.in/services/inference/...")
                setTimeout(() => {
                    document.getElementById('translatedText').innerText = "Processing complete (API Key required)";
                    statusText.innerText = "Done!";
                    stopRecording();
                }, 1500);

            } catch (error) {
                statusText.innerText = "Error connecting to Bhashini";
            }
        }

        function stopRecording() {
            isRecording = false;
            statusText.classList.remove('text-red-600');
            visualizer.classList.add('hidden');
            recordBtn.classList.replace('bg-red-600', 'bg-blue-600');
            document.getElementById('btnText').innerText = "Push to Speak";
        }
    </script>
</body>
</html>
